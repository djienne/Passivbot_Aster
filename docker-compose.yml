services:
  passivbot-live:
    build:
      context: .
      dockerfile: Dockerfile_live
    image: passivbot-aster-live:latest
    container_name: passivbot-aster-live
    restart: unless-stopped
    network_mode: bridge
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 1.0
    pids_limit: 256
    volumes:
      - ./:/app/
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      PASSIVBOT_CONFIG: "configs/config_hype_aster.json"
      PASSIVBOT_ARGS: ""
    command:
      - sh
      - -lc
      - python src/main.py "$${PASSIVBOT_CONFIG}" $${PASSIVBOT_ARGS}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
